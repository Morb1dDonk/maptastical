<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TABLE VIEW</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #16181f;
    --bg-panel:   #1a1c23;
    --bg-raised:  #20222b;
    --amber:      #e8a820;
    --green:      #5ec26a;
    --red:        #d95555;
    --cyan:       #7dd8de;
    --text:       #d4d7e0;
    --text-dim:   #6b7080;
    --border:     #2e3040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    user-select: none;
  }
  #app {
    width: 100vw; height: 100vh;
    display: flex;
  }
  .canvas-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #050706;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .canvas-overlay {
    position: absolute;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    pointer-events: none;
    background: rgba(22,24,31,0.72);
    padding: 3px 10px;
    z-index: 10;
  }
  .canvas-overlay.tl { top: 10px; left: 10px; }
  .canvas-overlay.bl { bottom: 10px; left: 10px; }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position: fixed; inset: 0;
    background: rgba(22,24,31,0.97);
    z-index: 20000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 44px 52px;
    min-width: 420px;
    text-align: center;
  }
  .login-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    letter-spacing: 0.08em;
    color: var(--amber);
    margin-bottom: 4px;
    font-weight: 700;
  }
  .login-sub {
    font-size: 13px;
    letter-spacing: 0.28em;
    color: var(--text-dim);
    margin-bottom: 32px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
    text-align: left;
    margin-bottom: 14px;
  }
  .field span {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--text-dim);
  }
  .field input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    padding: 10px 12px;
    letter-spacing: 0.1em;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--amber); }
  #table-code {
    font-size: 52px !important;
    text-align: center;
    letter-spacing: 0.35em;
    color: var(--amber);
    border-color: var(--amber) !important;
  }
  .btn {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    letter-spacing: 0.18em;
    padding: 10px 20px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    display: block;
    width: 100%;
  }
  .btn.primary {
    background: rgba(94,194,106,0.12);
    border-color: var(--green);
    color: var(--green);
    font-size: 18px;
    padding: 14px;
    margin-top: 8px;
  }
  .btn.primary:hover { background: rgba(94,194,106,0.22); }
  #login-error {
    margin-top: 12px;
    color: var(--red);
    font-size: 13px;
    letter-spacing: 0.1em;
    min-height: 18px;
  }

  /* ── STATUS TOAST ── */
  #status-toast {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.82);
    border: 1px solid var(--border);
    color: var(--amber);
    font-size: 13px;
    letter-spacing: 0.18em;
    padding: 6px 18px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  #status-toast.show { opacity: 1; }

  /* ── MODAL ── */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 30000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px 28px;
    min-width: 340px;
    max-width: 500px;
    width: 92vw;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-header h2 { font-family: 'Space Grotesk', sans-serif; font-size: 16px; letter-spacing: 0.12em; color: var(--amber); }
  .modal-close { background: transparent; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; }
  .modal-close:hover { color: var(--red); }
  #modalBody { font-size: 15px; line-height: 1.6; color: var(--text); margin-bottom: 18px; }
  #modalBody p { margin-bottom: 8px; }
  #modalButtons { display: flex; gap: 8px; justify-content: flex-end; }
  #modalButtons .btn { width: auto; font-size: 14px; padding: 8px 18px; }

  /* ── LABEL INPUT ── */
  #label-input-wrap {
    position: absolute;
    z-index: 100;
    display: none;
  }
  #label-input {
    background: rgba(22,24,31,0.92);
    border: 1px solid var(--amber);
    color: var(--amber);
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    padding: 4px 8px;
    letter-spacing: 0.1em;
    outline: none;
    width: 200px;
  }

  @media (max-width: 768px) {
    .login-box { min-width: unset; width: 92vw; padding: 32px 20px; }
    #table-code { font-size: 40px !important; }
  }
  #roll-toast-stack {
    position: fixed;
    bottom: 60px;
    right: 16px;
    z-index: 10001;
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    pointer-events: none;
    max-width: 260px;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(24px) scale(0.95); }
    to   { opacity: 1; transform: translateX(0)    scale(1); }
  }
  @keyframes toast-out {
    from { opacity: 1; transform: translateX(0) scale(1);    max-height: 120px; margin-bottom: 0; }
    to   { opacity: 0; transform: translateX(24px) scale(0.95); max-height: 0;   margin-bottom: -6px; }
  }
  .roll-toast {
    background: var(--bg-panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    animation: toast-in 0.22s ease forwards;
    display: flex;
    align-items: center;
    gap: 10px;
    overflow: hidden;
  }
  .roll-toast.bc-success {
    border-width: 3px;
    border-color: var(--green);
    box-shadow: 0 0 0 1px rgba(94,194,106,0.12), 0 4px 16px rgba(94,194,106,0.10);
  }
  .roll-toast.bc-failure {
    border-width: 3px;
    border-color: var(--red);
    box-shadow: 0 0 0 1px rgba(217,85,85,0.12), 0 4px 16px rgba(217,85,85,0.12);
  }
  .roll-toast.bc-neutral {
    border-width: 3px;
    border-color: var(--amber);
    box-shadow: 0 0 0 1px rgba(232,168,32,0.12), 0 4px 16px rgba(232,168,32,0.08);
  }
  .roll-toast.dismissing { animation: toast-out 0.3s ease forwards; }
  .rt-number { font-size: 44px; line-height: 1; flex-shrink: 0; }
  .rt-body   { display: flex; flex-direction: column; min-width: 0; }
  .rt-caller { font-size: 13px; letter-spacing: 0.18em; color: var(--amber); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rt-label  { font-size: 13px; letter-spacing: 0.12em; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rt-outcome{ font-size: 17px; letter-spacing: 0.12em; }
</style>
</head>

<script>
/* TABLE VIEW — standalone fullscreen map viewer
   Connects as player role, pure pan/zoom, no panels.
   Rendering code mirrors index.html exactly. */

const $ = id => document.getElementById(id);
const LS_USER        = 'gridgoblin_user';
const PORTRAIT_BASE  = 'Assets/';
const HORROR_SHAPES  = new Set(['enemy', 'alien']);
const TOKEN_COLOR_PLAYER = '#ffd700';
const TOKEN_COLOR_HORROR = '#ff3333';
const FIRE_FRAMES = 6;
const FIRE_FPS    = 10;
const USER_COLORS = ['#55FFFF','#FFFF55','#FF55FF','#55FF55','#FF5555','#5555FF','#FFFFFF','#AAAAAA'];

// ── STATE ──────────────────────────────────────────────────────────
const state = {
  mode: 'ship',
  gridSize: 32,
  showGrid: true,
  showCoords: true,
  zoom: 1,
  panX: 0,
  panY: 0,
  ship:   { cells: {} },
  hex:    { cells: {} },
  combat: { bg: {}, tokens: {}, nextId: 1 },
  labels: {},
  maps: [{ id: 'map_0', name: 'MAP 01' }],
  activeMapId: 'map_0',
  mapsData: {},
  mapListeners: [],
  net: {
    connected: false,
    room: null,
    role: null,
    userId: null,
    deviceId: null,
    userName: 'TABLE',
    userColor: '#7dd8de',
    users: {},
    listeners: [],
    connectedAt: 0,
    lastLocalBroadcastTs: 0,
  },
  character: null,
  characterId: null,
  roomChars: {},
  customTiles: {},
};

// ── CANVAS SETUP ────────────────────────────────────────────────────
const canvas     = $('mapCanvas');
const ctx        = canvas.getContext('2d');
const canvasWrap = $('canvasWrap');

const _fireSprite = new Image();
_fireSprite.src = 'fire.png';
const _bloodImg = new Image();
_bloodImg.src = 'blood.png';
_bloodImg.onload = () => draw();

function resizeCanvas() {
  const rect = canvasWrap.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
  if (state.net.connected && state.net.room) {
    const { ref: fbRef, set: fbSet } = window.FB;
    fbSet(fbRef(window.FB.db(), `rooms/${state.net.room}/tableView/viewport`), { w: canvas.width, h: canvas.height });
  }
  draw();
}
window.addEventListener('resize', resizeCanvas);

// ── NO-OP STUBS (panel/character/roll functions not needed here) ───
function renderCharCard()         {}
function renderCrewArchive()      {}
function renderUsers()            {}
function updateToolAvailability() {}
function updateRollLogClearBtn()  {}
function closeMobPanels()         {}
function showRollBroadcast(data) {
  const neutral    = data.ok === null || data.ok === undefined;
  const success    = data.ok === true;
  const stateClass = neutral ? 'bc-neutral' : success ? 'bc-success' : 'bc-failure';
  const colorVar   = neutral ? 'var(--amber)' : success ? 'var(--green)' : 'var(--red)';
  const caller     = (data.roller || 'CREW').toUpperCase();
  const label      = data.rollLabel || '';
  const outcome    = data.outcome   || '';

  const stack = document.getElementById('roll-toast-stack');
  const toast = document.createElement('div');
  toast.className = `roll-toast ${stateClass}`;
  toast.innerHTML =
    `<div class="rt-number" style="color:${colorVar}">${data.roll}</div>` +
    `<div class="rt-body">` +
      `<div class="rt-caller">${escapeHtml(caller)}</div>` +
      (label   ? `<div class="rt-label">${escapeHtml(label)}</div>`   : '') +
      (outcome ? `<div class="rt-outcome" style="color:${colorVar}">${escapeHtml(outcome)}</div>` : '') +
    `</div>`;
  stack.appendChild(toast);

  const dismiss = () => {
    toast.classList.add('dismissing');
    toast.addEventListener('animationend', () => toast.remove(), { once: true });
  };
  const t = setTimeout(dismiss, 5000);
  toast.addEventListener('click', () => { clearTimeout(t); dismiss(); }, { once: true });
}
function rebuildRollLog()         {}
function showCreditNotification() {}
function triggerKIA()             {}
function isCharAvailable()        { return false; }
function showCharacterSelectModal(){}
function openCharCreation()       {}

// ── COORDINATE HELPERS ─────────────────────────────────────────────
function worldToHex(wx, wy) {
  const size = state.gridSize * 0.8;
  const q = (Math.sqrt(3)/3 * wx - 1/3 * wy) / size;
  const r = (2/3 * wy) / size;
  return hexRound(q, r);
}
function hexToWorld(q, r) {
  const size = state.gridSize * 0.8;
  return { x: size * (Math.sqrt(3) * q + Math.sqrt(3)/2 * r), y: size * (3/2 * r) };
}
function hexRound(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq - q), dr = Math.abs(rr - r), ds = Math.abs(rs - s);
  if (dq > dr && dq > ds) rq = -rr - rs;
  else if (dr > ds) rr = -rq - rs;
  return { q: rq, r: rr };
}

// ── DRAWING ────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#050706';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(state.panX, state.panY);
  ctx.scale(state.zoom, state.zoom);
  if (state.showGrid) drawGrid();
  if (state.mode === 'hex') drawHex();
  else { drawShip(); drawFireLight(); drawTokensLayer(); drawLabels(); }
  ctx.restore();
}

function drawGrid() {
  const gs = state.gridSize;
  const w  = canvas.width  / state.zoom;
  const h  = canvas.height / state.zoom;
  const sx = -state.panX / state.zoom;
  const sy = -state.panY / state.zoom;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth   = 1 / state.zoom;

  if (state.mode === 'hex') {
    const size   = gs * 0.8;
    const hexW   = Math.sqrt(3) * size;
    const hexH   = 2 * size;
    const rRange = Math.ceil(h / (hexH * 0.75)) + 2;
    const qRange = Math.ceil(w / hexW) + 2;
    const sr     = Math.floor(sy / (hexH * 0.75)) - 1;
    const sq     = Math.floor(sx / hexW) - 1;
    for (let r = sr; r < sr + rRange; r++) {
      for (let q = sq - Math.floor(r/2); q < sq - Math.floor(r/2) + qRange; q++) {
        const { x, y } = hexToWorld(q, r);
        drawHexOutline(x, y, size);
      }
    }
  } else {
    const x0 = Math.floor(sx / gs) * gs;
    const y0 = Math.floor(sy / gs) * gs;
    for (let x = x0; x < sx + w; x += gs) {
      ctx.beginPath(); ctx.moveTo(x, sy); ctx.lineTo(x, sy + h); ctx.stroke();
    }
    for (let y = y0; y < sy + h; y += gs) {
      ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + w, y); ctx.stroke();
    }
    ctx.strokeStyle = '#243530';
    for (let x = x0; x < sx + w; x += gs) {
      if (Math.round(x/gs) % 5 === 0) { ctx.beginPath(); ctx.moveTo(x, sy); ctx.lineTo(x, sy + h); ctx.stroke(); }
    }
    for (let y = y0; y < sy + h; y += gs) {
      if (Math.round(y/gs) % 5 === 0) { ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + w, y); ctx.stroke(); }
    }
  }
}

function drawHexOutline(cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 3 * i + Math.PI / 6;
    const px = cx + size * Math.cos(angle), py = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.stroke();
}
function fillHex(cx, cy, size, color) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 3 * i + Math.PI / 6;
    const px = cx + size * Math.cos(angle), py = cy + size * Math.sin(angle);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = color; ctx.fill();
}

function drawShip() {
  const gs    = state.gridSize;
  const cells = state.ship.cells;
  for (const k in cells) {
    const [x, y] = k.split(',').map(Number);
    drawShipCell(x, y, cells[k], gs);
  }
  if (state.showCoords) drawSquareCoords();
}

function drawLabels() {
  const labels = state.labels;
  ctx.textBaseline = 'top';
  for (const id in labels) {
    const lb = labels[id];
    if (!lb.text) continue;
    const size = lb.size || 18;
    ctx.font = `bold ${size}px 'JetBrains Mono', monospace`;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillText(lb.text, lb.wx + 1, lb.wy + 1);
    ctx.fillStyle = lb.color || '#FFFF55';
    ctx.fillText(lb.text, lb.wx, lb.wy);
  }
}

function drawShipCell(gx, gy, cell, gs) {
  const x = gx * gs, y = gy * gs;
  const col = cell.color || '#5ec26a';
  ctx.save();
  switch (cell.type) {
    case 'wall':
      ctx.fillStyle = col; ctx.fillRect(x, y, gs, gs);
      break;
    case 'floor':
      ctx.fillStyle = col; ctx.globalAlpha = 0.18; ctx.fillRect(x, y, gs, gs); ctx.globalAlpha = 1;
      ctx.strokeStyle = col; ctx.globalAlpha = 0.3; ctx.strokeRect(x+1, y+1, gs-2, gs-2);
      break;
    case 'door':
      ctx.fillStyle = '#000'; ctx.fillRect(x, y, gs, gs);
      ctx.fillStyle = col; ctx.fillRect(x+gs*0.15, y+gs*0.4, gs*0.7, gs*0.2);
      break;
    case 'airlock':
      ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.strokeRect(x+3, y+3, gs-6, gs-6);
      ctx.beginPath(); ctx.arc(x+gs/2, y+gs/2, gs*0.25, 0, Math.PI*2); ctx.stroke();
      break;
    case 'console':
      ctx.fillStyle = col; ctx.fillRect(x+gs*0.15, y+gs*0.3, gs*0.7, gs*0.4);
      ctx.fillStyle = '#000'; ctx.fillRect(x+gs*0.2, y+gs*0.35, gs*0.6, gs*0.3);
      ctx.fillStyle = col;
      for (let i = 0; i < 3; i++) ctx.fillRect(x+gs*0.25+i*gs*0.18, y+gs*0.42, gs*0.1, gs*0.03);
      break;
    case 'bed':
      ctx.fillStyle = col; ctx.fillRect(x+gs*0.2, y+gs*0.15, gs*0.6, gs*0.7);
      ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(x+gs*0.25, y+gs*0.2, gs*0.5, gs*0.2);
      break;
    case 'crate':
      ctx.fillStyle = col; ctx.fillRect(x+gs*0.1, y+gs*0.1, gs*0.8, gs*0.8);
      ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 2;
      ctx.strokeRect(x+gs*0.1, y+gs*0.1, gs*0.8, gs*0.8);
      ctx.beginPath();
      ctx.moveTo(x+gs*0.5, y+gs*0.1); ctx.lineTo(x+gs*0.5, y+gs*0.9);
      ctx.moveTo(x+gs*0.1, y+gs*0.5); ctx.lineTo(x+gs*0.9, y+gs*0.5); ctx.stroke();
      break;
    case 'vent':
      ctx.fillStyle = '#000'; ctx.fillRect(x, y, gs, gs);
      ctx.strokeStyle = col; ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath(); ctx.moveTo(x+gs*0.15, y+gs*0.2+i*gs*0.15);
        ctx.lineTo(x+gs*0.85, y+gs*0.2+i*gs*0.15); ctx.stroke();
      }
      break;
    case 'hazard':
      ctx.fillStyle = '#AA5500'; ctx.fillRect(x, y, gs, gs);
      ctx.fillStyle = '#000';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(x, y+i*gs/4); ctx.lineTo(x+(i+1)*gs/4, y);
        ctx.lineTo(x+(i+1)*gs/4 + gs*0.15, y);
        ctx.lineTo(x, y+i*gs/4 + gs*0.15);
        ctx.closePath(); ctx.fill();
      }
      ctx.fillStyle = col;
      ctx.font = `bold ${gs*0.5}px 'JetBrains Mono'`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('!', x+gs/2, y+gs/2);
      break;
    case 'pod':
      ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x+gs/2, y+gs/2, gs*0.4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(x+gs/2, y+gs/2, gs*0.25, 0, Math.PI*2); ctx.fill();
      break;
    case 'terminal':
      ctx.fillStyle = '#000'; ctx.fillRect(x+gs*0.15, y+gs*0.15, gs*0.7, gs*0.7);
      ctx.strokeStyle = col; ctx.lineWidth = 1.5;
      ctx.strokeRect(x+gs*0.15, y+gs*0.15, gs*0.7, gs*0.7);
      ctx.fillStyle = col; ctx.font = `${gs*0.4}px 'JetBrains Mono'`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('>_', x+gs/2, y+gs/2);
      break;
    case 'rubble': {
      ctx.fillStyle = col; ctx.globalAlpha = 0.12; ctx.fillRect(x, y, gs, gs); ctx.globalAlpha = 1;
      const seed  = Math.abs(gx * 2053 + gy * 1399);
      const marks = ['×', '+', '·', '÷', '∘', '–'];
      ctx.font = `${Math.max(8, gs * 0.28)}px 'JetBrains Mono'`;
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      for (let i = 0; i < 5; i++) {
        const px = x + gs * 0.05 + ((seed * 7 + i * 83) % 100) / 100 * gs * 0.85;
        const py = y + gs * 0.05 + ((seed * 11 + i * 61) % 100) / 100 * gs * 0.72;
        ctx.fillStyle = col;
        ctx.globalAlpha = 0.35 + ((seed * 3 + i * 17) % 50) / 100;
        ctx.fillText(marks[(seed + i) % marks.length], px, py);
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'fire': {
      const offset = (gx * 3 + gy * 7) % FIRE_FRAMES;
      const frame  = (Math.floor(performance.now() / (1000 / FIRE_FPS)) + offset) % FIRE_FRAMES;
      ctx.imageSmoothingEnabled = false;
      if (_fireSprite.complete && _fireSprite.naturalWidth > 0) {
        ctx.drawImage(_fireSprite, frame * 16, 0, 16, 16, x, y, gs, gs);
      } else {
        ctx.fillStyle = '#FF6600'; ctx.globalAlpha = 0.85;
        ctx.fillRect(x, y, gs, gs); ctx.globalAlpha = 1;
      }
      ctx.imageSmoothingEnabled = true;
      break;
    }
    case 'blood': {
      ctx.imageSmoothingEnabled = false;
      if (_bloodImg.complete && _bloodImg.naturalWidth > 0) {
        ctx.drawImage(_bloodImg, x, y, gs, gs);
      } else {
        ctx.fillStyle = '#8b0000'; ctx.globalAlpha = 0.75;
        ctx.fillRect(x, y, gs, gs); ctx.globalAlpha = 1;
      }
      ctx.imageSmoothingEnabled = true;
      break;
    }
    case 'custom': {
      const tile = state.customTiles?.[cell.tileId];
      if (tile?.images?.length) {
        const fi  = tile.images.length > 1
          ? Math.floor(performance.now() / (1000 / (tile.fps || 8))) % tile.images.length
          : 0;
        const img = tile.images[fi];
        if (img.complete && img.naturalWidth > 0) {
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(img, x, y, gs, gs);
          ctx.imageSmoothingEnabled = true;
        } else {
          ctx.fillStyle = '#16181f'; ctx.fillRect(x, y, gs, gs);
          ctx.strokeStyle = '#e8a820'; ctx.lineWidth = 1; ctx.strokeRect(x+1,y+1,gs-2,gs-2);
        }
      } else {
        ctx.fillStyle = '#16181f'; ctx.fillRect(x, y, gs, gs);
        ctx.strokeStyle = '#e8a820'; ctx.lineWidth = 1; ctx.strokeRect(x+1,y+1,gs-2,gs-2);
        ctx.fillStyle = '#e8a820'; ctx.font = `${gs*0.35}px 'JetBrains Mono'`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('?', x+gs/2, y+gs/2);
      }
      break;
    }
  }
  ctx.restore();
}

function drawFireLight() {
  const fireCells = Object.entries(state.ship.cells).filter(([, c]) => c.type === 'fire');
  if (fireCells.length === 0) return;
  const t  = performance.now() * 0.001;
  const gs = state.gridSize;
  ctx.save();
  fireCells.forEach(([k]) => {
    const [gx, gy] = k.split(',').map(Number);
    if (!isFinite(gx) || !isFinite(gy)) return;
    const cx = (gx + 0.5) * gs, cy = (gy + 0.35) * gs;
    const r  = gs * 3.2;
    if (!isFinite(cx) || !isFinite(cy) || r <= 0) return;
    const f1 = Math.sin(t * 4.9 + gx * 1.7 + gy * 0.8);
    const f2 = Math.sin(t * 2.3 + gx * 0.5 + gy * 2.1);
    const intensity = 0.62 + f1 * 0.22 + f2 * 0.14;
    const grad = ctx.createRadialGradient(cx, cy, gs * 0.15, cx, cy, r);
    grad.addColorStop(0,   `rgba(255,150,20,${(intensity * 0.38).toFixed(3)})`);
    grad.addColorStop(0.35,`rgba(255,90,5,${(intensity * 0.20).toFixed(3)})`);
    grad.addColorStop(0.7, `rgba(200,40,0,${(intensity * 0.07).toFixed(3)})`);
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
  });
  ctx.restore();
}

function drawSquareCoords() {
  const gs = state.gridSize;
  if (gs < 24) return;
  ctx.fillStyle = 'rgba(90, 112, 99, 0.5)';
  ctx.font = `${Math.min(gs*0.25, 9)}px 'JetBrains Mono'`;
  const w = canvas.width / state.zoom, h = canvas.height / state.zoom;
  const sx = -state.panX / state.zoom, sy = -state.panY / state.zoom;
  const x0 = Math.floor(sx / gs), y0 = Math.floor(sy / gs);
  for (let x = x0; x < x0 + Math.ceil(w/gs) + 1; x++)
    for (let y = y0; y < y0 + Math.ceil(h/gs) + 1; y++)
      if (x % 5 === 0 && y % 5 === 0) ctx.fillText(`${x},${y}`, x*gs+2, y*gs+10);
}

function drawHex() {
  const gs   = state.gridSize;
  const size = gs * 0.8;
  const cells = state.hex.cells;
  for (const k in cells) {
    const [q, r] = k.split(',').map(Number);
    const cell   = cells[k];
    const { x, y } = hexToWorld(q, r);
    fillHex(x, y, size * 0.95, cell.color || '#5ec26a');
    drawHexIcon(x, y, size, cell);
    if (state.showCoords) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.font = `${size*0.22}px 'JetBrains Mono'`;
      ctx.textAlign = 'center';
      ctx.fillText(`${q},${r}`, x, y+size*0.75);
    }
  }
}

function drawHexIcon(cx, cy, size, cell) {
  const col = getIconColor(cell.color);
  ctx.fillStyle = col; ctx.strokeStyle = col; ctx.lineWidth = 2;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const r = size * 0.4;
  switch (cell.type) {
    case 'star': drawStar(cx, cy, r, 5); break;
    case 'planet': ctx.beginPath(); ctx.arc(cx, cy, r*0.7, 0, Math.PI*2); ctx.fill(); break;
    case 'station':
      ctx.beginPath();
      ctx.moveTo(cx, cy-r); ctx.lineTo(cx+r, cy); ctx.lineTo(cx, cy+r); ctx.lineTo(cx-r, cy);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.arc(cx, cy, r*0.3, 0, Math.PI*2); ctx.fill();
      break;
    case 'wreck': ctx.font = `${size*0.7}px 'JetBrains Mono'`; ctx.fillText('⚙', cx, cy); break;
    case 'nebula':
      for (let i = 0; i < 5; i++) {
        ctx.globalAlpha = 0.4;
        const a = Math.PI*2*i/5;
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r*0.4, cy+Math.sin(a)*r*0.4, r*0.5, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1; break;
    case 'asteroid':
      for (let i = 0; i < 4; i++) {
        const a = Math.PI*2*i/4;
        ctx.beginPath(); ctx.arc(cx+Math.cos(a)*r*0.35, cy+Math.sin(a)*r*0.35, r*0.2, 0, Math.PI*2); ctx.fill();
      }
      break;
    case 'jumppt':
      ctx.beginPath(); ctx.arc(cx, cy, r*0.7, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, r*0.45, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, r*0.2, 0, Math.PI*2); ctx.fill(); break;
    case 'anomaly': drawStar(cx, cy, r, 8); break;
    case 'derelict':
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx-r*0.6, cy-r*0.6); ctx.lineTo(cx+r*0.6, cy+r*0.6);
      ctx.moveTo(cx+r*0.6, cy-r*0.6); ctx.lineTo(cx-r*0.6, cy+r*0.6); ctx.stroke(); break;
    case 'colony':
      ctx.beginPath();
      ctx.moveTo(cx-r*0.6, cy+r*0.4); ctx.lineTo(cx-r*0.6, cy-r*0.1);
      ctx.lineTo(cx, cy-r*0.6); ctx.lineTo(cx+r*0.6, cy-r*0.1); ctx.lineTo(cx+r*0.6, cy+r*0.4);
      ctx.closePath(); ctx.fill(); break;
    case 'void': ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, r*0.5, 0, Math.PI*2); ctx.stroke(); break;
  }
}
function getIconColor(bg) {
  if (!bg) return '#AAAAAA';
  const r = parseInt(bg.slice(1,3),16), g = parseInt(bg.slice(3,5),16), b = parseInt(bg.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 < 0.45 ? '#AAAAAA' : '#000000';
}
function drawStar(cx, cy, r, points) {
  ctx.beginPath();
  for (let i = 0; i < points*2; i++) {
    const rad = i % 2 === 0 ? r : r*0.45;
    const a   = Math.PI*i/points - Math.PI/2;
    const px  = cx + Math.cos(a)*rad, py = cy + Math.sin(a)*rad;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath(); ctx.fill();
}

function isHorrorToken(t) { return HORROR_SHAPES.has(t.shape); }
function isPlayerToken(t)  { return !!t.playerId; }

function loadCustomTile(id, data) {
  if (!data?.frames?.length) return;
  const images = data.frames.map(src => {
    const img = new Image();
    img.onload = () => draw();
    img.src = src;
    return img;
  });
  state.customTiles[id] = { name: data.name || 'TILE', images, fps: data.fps || 8 };
}

const _portraitCache = {};
function getPortraitImage(filename) {
  if (!filename) return null;
  const cached = _portraitCache[filename];
  if (cached) return cached.complete && cached.naturalWidth > 0 ? cached : null;
  const img = new Image();
  _portraitCache[filename] = img;
  img.onload = () => draw();
  img.src = PORTRAIT_BASE + filename;
  return null;
}

function drawTokensLayer() {
  const gs  = state.gridSize;
  const now = Date.now();

  for (const k in state.combat.bg) {
    const [x, y] = k.split(',').map(Number);
    ctx.fillStyle = state.combat.bg[k];
    ctx.globalAlpha = 0.25; ctx.fillRect(x*gs, y*gs, gs, gs); ctx.globalAlpha = 1;
  }
  if (state.showCoords) drawSquareCoords();

  for (const gid in glitchingTokens) {
    const still = drawGlitchToken(glitchingTokens[gid], gs, now);
    if (!still) delete glitchingTokens[gid];
  }

  for (const id in state.combat.tokens) {
    const t = state.combat.tokens[id];
    if (t.hidden) continue;
    if (glitchingTokens[id]) continue;

    const x  = t.x * gs, y = t.y * gs;
    const cx = x + gs/2,  cy = y + gs/2;
    const r  = gs * 0.4;
    ctx.save();

    if (t.shape === 'kia') {
      ctx.fillStyle = '#1a0000';
      ctx.fillRect(x + gs*0.08, y + gs*0.08, gs*0.84, gs*0.84);
      ctx.strokeStyle = '#FF5555'; ctx.lineWidth = 1.5;
      ctx.strokeRect(x + gs*0.08, y + gs*0.08, gs*0.84, gs*0.84);
      ctx.fillStyle = '#FF5555';
      ctx.font = `${gs*0.52}px serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('☠', cx, cy);
      if (t.label) {
        ctx.fillStyle = 'rgba(0,0,0,0.75)';
        ctx.font = `${gs*0.22}px 'JetBrains Mono'`;
        ctx.fillText(t.label, cx+1, y - 3);
        ctx.fillStyle = '#AAAAAA';
        ctx.fillText(t.label, cx, y - 4);
      }
      ctx.restore(); continue;
    }

    const horror  = isHorrorToken(t);
    const player  = isPlayerToken(t);
    const color   = player ? TOKEN_COLOR_PLAYER : horror ? TOKEN_COLOR_HORROR : t.color;

    if (horror) {
      const pulse = (Math.sin(now / 650) + 1) / 2;
      ctx.shadowColor = TOKEN_COLOR_HORROR;
      ctx.shadowBlur  = 6 + pulse * 22;
    }

    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

    const ringPx = Math.max(2.5, gs * 0.1);
    const innerR = r - ringPx;
    const portrait = t.portrait || (t.charId ? state.roomChars[t.charId]?.portrait : null) || null;
    const portImg  = getPortraitImage(portrait);

    if (portImg) {
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI*2); ctx.clip();
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
      const iw = portImg.naturalWidth, ih = portImg.naturalHeight;
      const crop = Math.min(iw, ih);
      const sx = (iw - crop) / 2, sy = (ih - crop) / 2;
      ctx.drawImage(portImg, sx, sy, crop, crop, cx - innerR, cy - innerR, innerR * 2, innerR * 2);
      ctx.restore();
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath(); ctx.arc(cx, cy, r*0.8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = color;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `bold ${gs*0.38}px 'JetBrains Mono'`;
      const glyphs = { pc:'P', npc:'N', enemy:'✖', alien:'☠', object:'■' };
      ctx.fillText(glyphs[t.shape] || '?', cx, cy-1);
    }

    if (t.label) {
      const labelColor = player ? TOKEN_COLOR_PLAYER : horror ? TOKEN_COLOR_HORROR : '#e8e8e8';
      const labelFont  = player ? `bold ${gs*0.25}px 'JetBrains Mono'` : `${gs*0.22}px 'JetBrains Mono'`;
      ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.font = labelFont;
      ctx.fillText(t.label, cx+1, y - 3);
      ctx.fillStyle = labelColor;
      ctx.fillText(t.label, cx, y - 4);
    }
    if (t.hp) {
      ctx.fillStyle = '#e8a820'; ctx.font = `${gs*0.22}px 'JetBrains Mono'`;
      ctx.fillText(t.hp, cx, y + gs + 10);
    }
    if (state.net.connected && t.owner && state.net.users[t.owner] && !t.playerId) {
      ctx.fillStyle = state.net.users[t.owner].color || '#fff';
      ctx.beginPath(); ctx.arc(cx + r*0.85, cy - r*0.85, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── GLITCH ANIMATION ───────────────────────────────────────────────
let glitchingTokens = {};
let _prevTokenStates = {};

function startGlitch(tok) {
  glitchingTokens[tok.id] = { tok: { ...tok }, startTime: Date.now(), duration: 1800 };
  ensurePulseLoop();
}

function drawGlitchToken(g, gs, now) {
  const t        = g.tok;
  const progress = Math.min(1, (now - g.startTime) / g.duration);
  if (progress >= 1) return false;
  const x  = t.x * gs, y = t.y * gs;
  const cx = x + gs / 2, cy = y + gs / 2;
  const r  = gs * 0.4;
  const alpha = Math.max(0, 1 - progress);
  if (Math.random() < progress * 0.45) return true;
  ctx.save();
  const jitter = (Math.random() - 0.5) * progress * gs * 0.5;
  const aber   = progress * gs * 0.28;
  ctx.globalAlpha = alpha * 0.55;
  ctx.fillStyle = '#ff2222';
  ctx.beginPath(); ctx.arc(cx + jitter - aber, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#00ffee';
  ctx.beginPath(); ctx.arc(cx + jitter + aber, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = alpha * 0.85;
  const horror = isHorrorToken(t), player = isPlayerToken(t);
  ctx.fillStyle = player ? TOKEN_COLOR_PLAYER : horror ? TOKEN_COLOR_HORROR : (t.color || '#aaa');
  ctx.beginPath(); ctx.arc(cx + jitter, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.arc(cx + jitter, cy, r * 0.78, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = alpha * 0.45;
  ctx.fillStyle = '#000';
  for (let sy = y - 2; sy < y + gs + 2; sy += 3)
    ctx.fillRect(cx + jitter - gs * 0.55, sy, gs * 1.1, 1);
  if (Math.random() < 0.5) {
    const barY = y + Math.random() * gs;
    const barH = 1 + Math.random() * gs * 0.13;
    ctx.globalAlpha = alpha * 0.75;
    ctx.fillStyle = Math.random() < 0.5 ? '#00eeff' : '#ff2244';
    ctx.fillRect(x - gs * 0.6 + jitter, barY, gs * 1.8, barH);
  }
  ctx.restore();
  return true;
}

// ── PULSE LOOP ─────────────────────────────────────────────────────
let _pulseRaf = null;
function ensurePulseLoop() {
  if (_pulseRaf) return;
  function tick() {
    const hasHorror = state.mode === 'ship' &&
      Object.values(state.combat.tokens).some(t => isHorrorToken(t));
    const hasGlitch = Object.keys(glitchingTokens).length > 0;
    const hasFire   = state.mode === 'ship' &&
      Object.values(state.ship.cells).some(c => c.type === 'fire');
    const hasCustomAnim = state.mode === 'ship' &&
      Object.values(state.ship.cells).some(c =>
        c.type === 'custom' && (state.customTiles[c.tileId]?.images?.length || 0) > 1);
    if (!hasHorror && !hasGlitch && !hasFire && !hasCustomAnim) { _pulseRaf = null; return; }
    draw();
    _pulseRaf = requestAnimationFrame(tick);
  }
  _pulseRaf = requestAnimationFrame(tick);
}

canvasWrap.addEventListener('contextmenu', e => e.preventDefault());

function generateId()   { return Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2); }
function escapeHtml(s)  { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function encKey(k)      { return k.replace(/,/g, '_').replace(/-/g, 'n'); }
function decKey(k)      { return k.replace(/_/g, ',').replace(/n/g, '-'); }
function updateStats()  { $('stat-obj').textContent = String(Object.keys(state.ship.cells).length + Object.keys(state.hex.cells).length + Object.keys(state.combat.tokens).length).padStart(3,'0'); }

// ── SYNC HELPERS ────────────────────────────────────────────────────
function syncSet(path, value) {
  if (!state.net.connected) return;
  const { ref, set } = window.FB;
  set(ref(window.FB.db(), `rooms/${state.net.room}/${path}`), value).catch(console.error);
  flashSync();
}
function syncUpdate(path, patch) {
  if (!state.net.connected) return;
  const { ref, update } = window.FB;
  update(ref(window.FB.db(), `rooms/${state.net.room}/${path}`), patch).catch(console.error);
  flashSync();
}
function syncDelete(path) {
  if (!state.net.connected) return;
  const { ref, remove } = window.FB;
  remove(ref(window.FB.db(), `rooms/${state.net.room}/${path}`)).catch(console.error);
  flashSync();
}
function syncMapSet(path, value)    { syncSet(`maps/${state.activeMapId}/${path}`, value); }
function syncMapUpdate(path, patch) { syncUpdate(`maps/${state.activeMapId}/${path}`, patch); }
function syncMapDelete(path)        { syncDelete(`maps/${state.activeMapId}/${path}`); }

// ── MAP MODE ────────────────────────────────────────────────────────
function setMode(m, fromRemote) {
  state.mode = m;
  state.panX = 0; state.panY = 0; state.zoom = 1;
  draw();
}

// ── RENDER STUBS ────────────────────────────────────────────────────
function renderTokens()   { ensurePulseLoop(); draw(); }
function renderMapPicker() {
  const current = state.maps.find(m => m.id === state.activeMapId) || state.maps[0];
  $('ov-sector').textContent = (current?.name || '—').toUpperCase();
}

// ── NETWORK ─────────────────────────────────────────────────────────
function subscribeToMap(code, mapId) {
  state.mapListeners.forEach(u => u());
  state.mapListeners = [];
  const { ref, onValue } = window.FB;
  const db = window.FB.db();
  const sub = (path, cb) => {
    const r     = ref(db, `rooms/${code}/maps/${mapId}/${path}`);
    const unsub = onValue(r, snap => { cb(snap.val()); flashSync(); });
    state.mapListeners.push(unsub);
  };
  sub('ship/cells', val => {
    const cells = {};
    if (val) for (const k in val) cells[decKey(k)] = val[k];
    state.ship.cells = cells;
    if (state.mode === 'ship') { draw(); if (Object.values(cells).some(c => c.type === 'fire')) ensurePulseLoop(); }
    updateStats();
  });
  sub('hex/cells', val => {
    const cells = {};
    if (val) for (const k in val) cells[decKey(k)] = val[k];
    state.hex.cells = cells;
    if (state.mode === 'hex') draw();
    updateStats();
  });
  sub('combat/bg', val => {
    const bg = {};
    if (val) for (const k in val) bg[decKey(k)] = val[k];
    state.combat.bg = bg;
    if (state.mode === 'ship') draw();
  });
  sub('combat/tokens', val => {
    const newTokens = val || {};
    for (const id in newTokens) {
      const prev = _prevTokenStates[id];
      const wasVisible = !prev || !prev.hidden;
      if (wasVisible && !!newTokens[id].hidden) startGlitch(newTokens[id]);
    }
    _prevTokenStates = {};
    for (const id in newTokens) _prevTokenStates[id] = { hidden: !!newTokens[id].hidden };
    state.combat.tokens = newTokens;
    if (state.mode === 'ship') { renderTokens(); draw(); }
    ensurePulseLoop(); updateStats();
  });
  sub('labels', val => { state.labels = val || {}; draw(); });
  sub('tableView', val => {
    if (!val) return;
    if (typeof val.panX === 'number') state.panX = val.panX;
    if (typeof val.panY === 'number') state.panY = val.panY;
    if (typeof val.zoom  === 'number') state.zoom = val.zoom;
    draw();
  });
}

function switchToMap(mapId, fromRemote) {
  if (mapId === state.activeMapId && fromRemote) { renderMapPicker(); return; }
  state.mapsData[state.activeMapId] = {
    ship:   JSON.parse(JSON.stringify(state.ship)),
    hex:    JSON.parse(JSON.stringify(state.hex)),
    combat: JSON.parse(JSON.stringify(state.combat)),
    labels: JSON.parse(JSON.stringify(state.labels)),
  };
  state.activeMapId = mapId;
  const cached = state.mapsData[mapId];
  state.ship   = cached ? JSON.parse(JSON.stringify(cached.ship))   : { cells: {} };
  state.hex    = cached ? JSON.parse(JSON.stringify(cached.hex))    : { cells: {} };
  state.combat = cached ? JSON.parse(JSON.stringify(cached.combat)) : { bg: {}, tokens: {}, nextId: 1 };
  state.labels = cached ? JSON.parse(JSON.stringify(cached.labels)) : {};
  if (state.net.connected) subscribeToMap(state.net.room, mapId);
  renderMapPicker();
  draw(); updateStats();
  flashStatus('MAP: ' + (state.maps.find(m => m.id === mapId)?.name || mapId).toUpperCase());
}

function subscribeToRoom(code) {
  const { ref, onValue } = window.FB;
  const db = window.FB.db();
  const sub = (path, cb) => {
    const r     = ref(db, `rooms/${code}/${path}`);
    const unsub = onValue(r, snap => { cb(snap.val()); flashSync(); });
    state.net.listeners.push(unsub);
  };

  subscribeToMap(code, state.activeMapId);

  sub('activeMapId', val => {
    if (val && val !== state.activeMapId) switchToMap(val, true);
  });
  sub('mapMeta', val => {
    if (!val) return;
    for (const id in val) {
      const existing = state.maps.find(m => m.id === id);
      if (existing) existing.name = val[id].name || existing.name;
      else state.maps.push({ id, name: val[id].name || id });
    }
    renderMapPicker();
  });
  sub('mode', val => {
    if (val && val !== state.mode) setMode(val, true);
  });
  sub('users', val => {
    state.net.users = val || {};
    if (state.mode === 'ship') { renderTokens(); draw(); }
  });
  sub('characters', val => {
    state.roomChars = val || {};
    if (state.mode === 'ship') renderTokens();
  });
  sub('customTiles', val => {
    state.customTiles = {};
    if (val) for (const id in val) loadCustomTile(id, val[id]);
    if (Object.values(state.ship.cells).some(c => c.type === 'custom')) ensurePulseLoop();
    draw();
  });
  sub('closed', val => {
    if (!val) return;
    if (typeof val === 'number' && val < state.net.connectedAt) return;
    flashStatus('GM HAS ENDED THE SESSION');
    disconnectFromRoom();
  });
  sub('broadcast', val => {
    if (!val || !val.ts) return;
    if (val.ts < state.net.connectedAt - 2000) return;
    showRollBroadcast(val);
  });
}

async function connectToRoom(code, role) {
  state.net.userId      = generateId();
  state.character       = null;
  state.characterId     = null;
  const { ref, get, set, onDisconnect, serverTimestamp } = window.FB;
  const db = window.FB.db();

  const roomRef = ref(db, `rooms/${code}`);
  const snap    = await get(roomRef);
  if (!snap.exists()) {
    showLoginScreen();
    showLoginError('ROOM NOT FOUND: ' + code);
    return;
  }

  state.net.connected   = true;
  state.net.room        = code;
  state.net.role        = role;
  state.net.connectedAt = Date.now();
  state.net.lastLocalBroadcastTs = 0;
  if (!state.net.userColor || state.net.userColor === '#55FFFF') {
    state.net.userColor = USER_COLORS[Math.floor(Math.random() * USER_COLORS.length)];
  }

  const userRef = ref(db, `rooms/${code}/users/${state.net.userId}`);
  await set(userRef, {
    name: state.net.userName,
    color: state.net.userColor,
    role,
    deviceId: state.net.deviceId,
    joined: serverTimestamp(),
  });
  onDisconnect(userRef).remove();

  // Presence flag — lets the GM index.html know the table screen is live
  const onlineRef = ref(db, `rooms/${code}/tableView/online`);
  await set(onlineRef, true);
  onDisconnect(onlineRef).remove();

  const data    = snap.val();
  const activeId = data.activeMapId || 'map_0';
  const mapData  = (data.maps && data.maps[activeId]) || {};
  state.ship        = mapData.ship   || { cells: {} };
  state.hex         = mapData.hex    || { cells: {} };
  state.combat      = mapData.combat || { bg: {}, tokens: {}, nextId: 1 };
  if (!state.combat.tokens) state.combat.tokens = {};
  if (!state.combat.bg)     state.combat.bg = {};
  state.gridSize    = mapData.gridSize || data.gridSize || 32;
  state.activeMapId = activeId;
  state.roomChars   = data.characters || {};

  subscribeToRoom(code);
  // Report our viewport dimensions so the GM overlay knows table screen size
  const { ref: fbRef, set: fbSet } = window.FB;
  fbSet(fbRef(window.FB.db(), `rooms/${code}/tableView/viewport`), { w: canvas.width, h: canvas.height });
  hideLoginScreen();
  renderMapPicker();
  renderTokens(); draw(); updateStats();
  flashStatus('LINKED // ' + code);
}

async function disconnectFromRoom() {
  const { ref, remove } = window.FB;
  const db = window.FB.db();
  if (state.net.userId && state.net.room) {
    try { await remove(ref(db, `rooms/${state.net.room}/users/${state.net.userId}`)); } catch {}
  }
  state.net.listeners.forEach(unsub => { try { unsub(); } catch {} });
  state.net.listeners = [];
  state.mapListeners.forEach(u => { try { u(); } catch {} });
  state.mapListeners  = [];
  state.net.connected = false;
  state.net.room      = null;
  state.net.role      = null;
  state.net.users     = {};
  state.characterId   = null;
  state.roomChars     = {};
  showLoginScreen();
}

// ── USER PREFS ──────────────────────────────────────────────────────
function loadUserPrefs() {
  try {
    const u = JSON.parse(localStorage.getItem(LS_USER) || '{}');
    if (u.name)     { state.net.userName = u.name; $('userName').value = u.name; }
    if (u.color)    state.net.userColor = u.color;
    if (u.deviceId) state.net.deviceId  = u.deviceId;
  } catch {}
  if (!state.net.deviceId) state.net.deviceId = generateId();
}
function saveUserPrefs() {
  localStorage.setItem(LS_USER, JSON.stringify({
    name: state.net.userName, color: state.net.userColor, deviceId: state.net.deviceId,
  }));
}

// ── LOGIN SCREEN ────────────────────────────────────────────────────
function showLoginScreen() { $('login-screen').style.display = 'flex'; }
function hideLoginScreen() { $('login-screen').style.display = 'none'; }
function showLoginError(msg) {
  const el = $('login-error');
  el.textContent = msg;
  if (!msg) return;
  setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 4000);
}

$('table-code').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});

async function doConnect() {
  const code = $('table-code').value.trim().toUpperCase();
  showLoginError('');
  if (code.length !== 4) { showLoginError('ENTER A 4-LETTER ROOM CODE'); return; }
  if (!window.FB?.configured) { showLoginError('FIREBASE NOT CONFIGURED'); return; }
  state.net.userName = 'TABLE';
  $('userName').value = 'TABLE';
  saveUserPrefs();
  hideLoginScreen();
  try {
    await connectToRoom(code, 'player');
  } catch (err) {
    console.error(err);
    showLoginError('CONNECTION FAILED');
    showLoginScreen();
  }
}

$('table-connect').addEventListener('click', doConnect);
$('table-code').addEventListener('keydown',  e => { if (e.key === 'Enter') doConnect(); });

// ── INIT ─────────────────────────────────────────────────────────────
loadUserPrefs();
resizeCanvas();
state.panX = canvas.width  / 2 - (state.gridSize * 10);
state.panY = canvas.height / 2 - (state.gridSize * 7);
draw();

// Pre-fill room code from URL param if present
(function checkRoomParam() {
  const params   = new URLSearchParams(location.search);
  const roomCode = params.get('room')?.toUpperCase();
  if (roomCode && roomCode.length === 4) $('table-code').value = roomCode;
})();
</script>
