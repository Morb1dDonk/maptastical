<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TILE MAKER 3000</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #16181f;
    --bg-panel:  #1a1c23;
    --bg-raised: #20222b;
    --amber:     #e8a820;
    --green:     #5ec26a;
    --red:       #d95555;
    --cyan:      #7dd8de;
    --text:      #d4d7e0;
    --text-dim:  #6b7080;
    --border:    #2e3040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    user-select: none;
  }

  /* ── HEADER ── */
  #header {
    height: 44px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px; flex-shrink: 0;
  }
  .header-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.22em; color: var(--amber);
  }
  .header-sub {
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--text-dim);
  }
  .gg-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; cursor: pointer; }
  .gg-brand-logo { width: 32px; height: 32px; object-fit: contain; image-rendering: pixelated; image-rendering: crisp-edges; filter: drop-shadow(0 0 5px rgba(110,201,122,0.32)); flex-shrink: 0; }
  .gg-brand-name { font-family: 'Space Grotesk', sans-serif; font-size: 12px; letter-spacing: 0.2em; color: var(--text); font-weight: 600; position: relative; padding-left: 10px; }
  .gg-brand-name::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 1px; height: 14px; background: var(--border); }
  .gg-brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; color: var(--text-dim); }
  .header-sep { flex: 1; }
  .mode-btn {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em;
    padding: 5px 10px; cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .mode-btn:hover { border-color: var(--amber); color: var(--text); }
  .mode-btn.active { border-color: var(--amber); color: var(--amber); background: rgba(232,168,32,0.07); }

  /* ── LAYOUT ── */
  #app { display: flex; height: calc(100vh - 44px); }

  /* ── SIDEBARS ── */
  .sidebar {
    width: 240px; background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-right {
    width: 240px; background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto; flex-shrink: 0;
  }
  .panel-section { padding: 10px 10px 6px; }
  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px; letter-spacing: 0.28em;
    color: var(--text-dim);
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  /* ── TOOL GRID ── */
  .tool-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 4px; margin-bottom: 6px;
  }
  .tool {
    aspect-ratio: 1;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
    font-size: 30px;
    transition: all 0.1s;
    position: relative;
  }
  .tool:hover { border-color: rgba(232,168,32,0.5); color: var(--text); }
  .tool.active { background: rgba(232,168,32,0.15); color: var(--amber); border-color: var(--amber); }
  .tool .label {
    position: absolute;
    bottom: 2px;
    left: 2px;
    font-size: 12px;
    letter-spacing: 0.1em;
    opacity: 0.6;
  }
  .tool-hint {
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.1em; margin-bottom: 6px;
    line-height: 1.6;
  }

  /* ── BUTTONS ── */
  .btn {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em;
    padding: 5px 10px; cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
    display: block; width: 100%;
    text-align: center; margin-bottom: 4px;
  }
  .btn:hover { border-color: var(--amber); color: var(--amber); }
  .btn.active { border-color: var(--amber); color: var(--amber); background: rgba(232,168,32,0.07); }
  .btn.green { border-color: var(--green); color: var(--green); background: rgba(94,194,106,0.07); }
  .btn.green:hover { background: rgba(94,194,106,0.16); }
  .btn.red { border-color: var(--red); color: var(--red); }
  .btn.red:hover { background: rgba(217,85,85,0.12); }
  .btn-row { display: flex; gap: 4px; margin-bottom: 4px; }
  .btn-row .btn { margin-bottom: 0; flex: 1; padding: 4px 4px; }

  /* ── FIELD ── */
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
  .field span { font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); }
  .field input[type=text], .field input[type=number] {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 13px; padding: 5px 8px; outline: none;
    transition: border-color 0.12s;
  }
  .field input:focus { border-color: var(--amber); }

  /* ── COLOR ── */
  #color-preview-box {
    width: 100%; height: 34px;
    border: 1px solid var(--border);
    cursor: pointer; margin-bottom: 6px;
    position: relative; overflow: hidden;
  }
  #color-picker {
    position: absolute; inset: 0;
    opacity: 0; width: 100%; height: 100%;
    cursor: pointer; padding: 0; border: none;
  }
  .swatch-grid {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 3px; margin-bottom: 4px;
  }
  .swatch {
    aspect-ratio: 1;
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { outline: 2px solid var(--green); outline-offset: 1px; }
  #transparent-swatch {
    width: 100%; height: 14px; cursor: pointer;
    border: 1.5px solid var(--border); margin-bottom: 6px;
    background: repeating-conic-gradient(#555 0% 25%, #333 0% 50%) 0 0 / 8px 8px;
  }
  #transparent-swatch.active { outline: 2px solid var(--amber); }

  /* ── BRUSH SIZE ── */
  .brush-row { display: flex; gap: 3px; margin-bottom: 6px; }
  .brush-btn {
    background: var(--bg-raised); border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    padding: 3px 4px; cursor: pointer; flex: 1; text-align: center;
    transition: border-color 0.1s, color 0.1s;
  }
  .brush-btn:hover { border-color: var(--amber); color: var(--text); }
  .brush-btn.active { border-color: var(--amber); color: var(--amber); }

  /* ── CANVAS AREA ── */
  #canvas-area {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg); position: relative; overflow: hidden;
  }
  #canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #checker-bg {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-conic-gradient(#1d1f27 0% 25%, #191b22 0% 50%) 0 0 / 16px 16px;
  }
  #draw-canvas {
    image-rendering: pixelated; cursor: crosshair;
    position: relative; z-index: 1;
  }
  #brush-cursor {
    position: absolute; pointer-events: none; z-index: 10;
    border: 1px solid rgba(255,255,255,0.85);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.7);
    display: none;
  }
  #coords {
    position: absolute; top: 8px; right: 10px;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.14em; z-index: 10;
    pointer-events: none;
    background: rgba(22,24,31,0.75); padding: 2px 6px;
  }

  /* ── TIMELINE ── */
  #timeline {
    height: 90px; background: var(--bg-panel);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px; flex-shrink: 0;
    overflow-x: auto;
  }
  .timeline-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px; letter-spacing: 0.26em;
    color: var(--text-dim); writing-mode: vertical-rl;
    transform: rotate(180deg); flex-shrink: 0;
  }
  #frame-slots { display: flex; gap: 6px; flex-shrink: 0; }
  .frame-slot {
    width: 64px; height: 64px;
    border: 2px solid var(--border);
    cursor: pointer; position: relative; flex-shrink: 0;
    transition: border-color 0.12s;
  }
  .frame-slot:hover { border-color: var(--text-dim); }
  #btn-play {
    width: 64px; height: 64px; flex-shrink: 0;
    border: 2px solid var(--border); border-radius: 6px;
    background: var(--bg-raised); color: var(--text-dim);
    font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
  }
  #btn-play:hover { border-color: var(--text-dim); color: var(--text); }
  #btn-play.active { border-color: var(--amber); color: var(--amber); background: rgba(232,168,32,0.07); }
  .frame-slot.active { border-color: var(--amber); }
  .frame-slot canvas {
    width: 64px; height: 64px; display: block;
    image-rendering: pixelated;
  }
  .frame-num {
    position: absolute; top: 2px; left: 3px;
    font-size: 9px; color: rgba(255,255,255,0.55);
    pointer-events: none;
    text-shadow: 0 0 3px #000, 0 0 3px #000;
  }
  .frame-actions {
    display: flex; flex-direction: column; gap: 4px;
    flex-shrink: 0; margin-left: 4px;
  }
  .frame-actions .btn {
    padding: 3px 8px; font-size: 9px;
    margin-bottom: 0; letter-spacing: 0.1em;
  }

  /* ── PREVIEW ── */
  .preview-wrap {
    background: repeating-conic-gradient(#222 0% 25%, #1a1a1a 0% 50%) 0 0 / 10px 10px;
    border: 1px solid var(--border);
    margin-bottom: 8px; display: block;
  }
  #preview-canvas {
    display: block; image-rendering: pixelated;
    width: 148px; height: 148px;
  }

  /* ── ZOOM ROW ── */
  .zoom-row {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 6px;
  }
  .zoom-row .label { font-size: 10px; letter-spacing: 0.14em; color: var(--text-dim); }
  .zoom-row .controls { display: flex; align-items: center; gap: 4px; }
  .zoom-row .z-btn {
    background: var(--bg-raised); border: 1px solid var(--border);
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; padding: 1px 7px; cursor: pointer;
  }
  .zoom-row .z-btn:hover { border-color: var(--amber); color: var(--amber); }
  #zoom-label { font-size: 11px; color: var(--amber); min-width: 28px; text-align: center; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }

  /* ── STATUS TOAST ── */
  #status-toast {
    position: fixed; bottom: 108px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.9); border: 1px solid var(--border);
    color: var(--amber); font-size: 11px; letter-spacing: 0.18em;
    padding: 5px 16px; border-radius: 2px;
    pointer-events: none; z-index: 9999;
    opacity: 0; transition: opacity 0.2s; white-space: nowrap;
  }
  #status-toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <a class="gg-brand" href="landing.html" title="Back to landing page">
    <img class="gg-brand-logo" src="GG_logo.png" alt="Grid Goblin">
    <span class="gg-brand-name">GRIDGOBLIN</span>
    <span class="gg-brand-sub">// TOOLS.SYS</span>
  </a>
  <div class="header-title">TILE MAKER 3000</div>
  <div class="header-sub">64 × 64</div>
</div>

<div id="app">

  <!-- LEFT: Tools + Color -->
  <div class="sidebar">
    <div class="panel-section">
      <div class="section-label">TOOLS</div>
      <div class="tool-grid" id="tool-grid"></div>
      <div class="tool-hint" id="tool-hint">LMB draw · RMB erase</div>
    </div>
    <div class="panel-section">
      <div class="section-label">BRUSH SIZE</div>
      <div class="brush-row" id="brush-row">
        <div class="brush-btn active" data-size="1" onclick="setBrush(1)">1</div>
        <div class="brush-btn"       data-size="2" onclick="setBrush(2)">2</div>
        <div class="brush-btn"       data-size="3" onclick="setBrush(3)">3</div>
        <div class="brush-btn"       data-size="4" onclick="setBrush(4)">4</div>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-label">COLOR</div>
      <div id="color-preview-box">
        <input type="color" id="color-picker" value="#5ec26a">
      </div>
      <div class="swatch-grid" id="swatch-grid"></div>
      <div id="transparent-swatch" title="Transparent (erases pixel)" onclick="pickTransparent()"></div>
    </div>
    <div class="panel-section">
      <div class="section-label">OPTIONS</div>
      <button class="btn active" id="btn-grid"  onclick="toggleGrid()">⊞ GRID</button>
      <button class="btn"        id="btn-onion" onclick="toggleOnion()">◈ ONION</button>
    </div>
    <div class="panel-section">
      <div class="section-label">HISTORY</div>
      <div class="btn-row">
        <button class="btn" onclick="undo()">↩ UNDO</button>
        <button class="btn" onclick="redo()">↪ REDO</button>
      </div>
      <div style="font-size:9px;color:var(--text-dim);letter-spacing:0.12em;margin-top:4px">
        CTRL+Z · CTRL+Y
      </div>
    </div>
    <div class="panel-section">
      <div class="section-label">HOTKEYS</div>
      <div style="font-size:9px;color:var(--text-dim);letter-spacing:0.1em;line-height:1.9">
        P — Pencil<br>
        E — Eraser<br>
        F — Fill<br>
        I — Eyedropper<br>
        L — Line<br>
        R — Rect<br>
        [ ] — Brush size
      </div>
    </div>
  </div>

  <!-- CENTER: Canvas + Timeline -->
  <div id="canvas-area">
    <div id="canvas-wrap">
      <div id="checker-bg"></div>
      <canvas id="draw-canvas"></canvas>
      <div id="brush-cursor"></div>
      <div id="coords">0, 0</div>
    </div>
    <div id="timeline">
      <div class="timeline-label">FRAMES</div>
      <div id="frame-slots"></div>
      <button id="btn-play" onclick="toggleAnimate()" title="Play / Stop animation">▶</button>
      <div class="frame-actions">
        <button class="btn" onclick="dupFrame()">⊕ DUP</button>
        <button class="btn" onclick="clearFrame(false)">CLR</button>
        <button class="btn red" onclick="clearFrame(true)">CLR ALL</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Preview + Export -->
  <div class="sidebar-right">
    <div class="panel-section">
      <div class="section-label">PREVIEW</div>
      <div class="preview-wrap">
        <canvas id="preview-canvas" width="64" height="64"></canvas>
      </div>
      <div class="field">
        <span>ANIM FPS</span>
        <input type="number" id="fps-input" min="1" max="30" value="8">
      </div>
    </div>
    <div class="panel-section">
      <div class="section-label">TILE NAME</div>
      <div class="field">
        <input type="text" id="tile-name" value="CUSTOM_TILE" maxlength="24" style="font-size:12px">
      </div>
    </div>
    <div class="panel-section">
      <div class="section-label">EXPORT</div>
      <button class="btn green" onclick="exportFrame()">↓ FRAME PNG</button>
      <button class="btn green" onclick="exportSheet()">↓ SPRITESHEET</button>
      <button class="btn"       onclick="exportJSON()">↓ TILE DATA</button>
      <hr class="divider">
      <button class="btn"       onclick="importJSON()">↑ LOAD DATA</button>
      <input type="file" id="import-input" accept=".json" style="display:none">
    </div>
    <div class="panel-section">
      <div class="section-label">ZOOM</div>
      <div class="zoom-row">
        <span class="label">LEVEL</span>
        <div class="controls">
          <button class="z-btn" onclick="adjustZoom(-2)">−</button>
          <span id="zoom-label">8×</span>
          <button class="z-btn" onclick="adjustZoom(2)">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="status-toast"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const TILE_W     = 64;
const TILE_H     = 64;
const NUM_FRAMES = 6;

const PALETTE = [
  '#ffffff','#d4d7e0','#aaaaaa','#6b7080','#2e3040',
  '#16181f','#000000','#d95555','#e8a820','#5ec26a',
  '#7dd8de','#4488ff','#ff8844','#aa44ff','#ff44aa',
  '#55ff55','#ffff44','#ff2222','#00ccff','#8800ff',
];

const TOOLS = [
  { id:'pencil',     icon:'✏',  label:'PENCIL', hint:'LMB draw · RMB erase' },
  { id:'eraser',     icon:'◻',  label:'ERASE',  hint:'Clears pixels to transparent' },
  { id:'fill',       icon:'◼',  label:'FILL',   hint:'Flood fill from clicked pixel' },
  { id:'eyedropper', icon:'⊕',  label:'PICK',   hint:'Click to sample color' },
  { id:'line',       icon:'╱',  label:'LINE',   hint:'Click+drag to draw line' },
  { id:'rect',       icon:'▭',  label:'RECT',   hint:'Click+drag to draw rectangle' },
];

// ── STATE ──────────────────────────────────────────────────────────────────
const frames     = Array.from({length: NUM_FRAMES}, () => new Uint8ClampedArray(TILE_W * TILE_H * 4));
let currentFrame = 0;
let currentTool  = 'pencil';
let currentColor = '#5ec26a';
let currentAlpha = 255;
let brushSize    = 1;
let zoom         = 8;
let showGrid     = true;
let onionSkin    = false;
let animating    = false;
let animFrame    = 0;
let animTimer    = null;
let history      = [];
let historyIdx   = -1;
let isDrawing    = false;
let lineStart    = null;
let previewPx    = null;  // uncommitted line/rect preview

// ── DOM ────────────────────────────────────────────────────────────────────
const canvas     = document.getElementById('draw-canvas');
const ctx        = canvas.getContext('2d');
const previewCvs = document.getElementById('preview-canvas');
const previewCtx = previewCvs.getContext('2d');

// ── INIT ───────────────────────────────────────────────────────────────────
function init() {
  buildToolGrid();
  buildSwatches();
  buildFrameSlots();
  setupColorPicker();
  bindCanvasEvents();
  document.getElementById('fps-input').addEventListener('input', () => { if (animating) startAnim(); });
  document.getElementById('import-input').addEventListener('change', onImport);
  setZoom(zoom);
  pushHistory();
  renderAll();
}

// ── CANVAS SIZE ────────────────────────────────────────────────────────────
function setZoom(z) {
  zoom = z;
  canvas.width  = TILE_W * zoom;
  canvas.height = TILE_H * zoom;
  document.getElementById('zoom-label').textContent = zoom + '×';
  _brushCursorEl().style.display = 'none';
  render();
}

function adjustZoom(delta) {
  setZoom(Math.max(2, Math.min(16, zoom + delta)));
}

// ── TOOL GRID ──────────────────────────────────────────────────────────────
function buildToolGrid() {
  const grid = document.getElementById('tool-grid');
  grid.innerHTML = '';
  TOOLS.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tool' + (t.id === currentTool ? ' active' : '');
    el.dataset.tool = t.id;
    el.innerHTML = `${t.icon}<span class="label">${t.label}</span>`;
    el.addEventListener('click', () => selectTool(t.id));
    grid.appendChild(el);
  });
}

function selectTool(id) {
  currentTool = id;
  document.querySelectorAll('.tool').forEach(el => el.classList.toggle('active', el.dataset.tool === id));
  const t = TOOLS.find(t => t.id === id);
  document.getElementById('tool-hint').textContent = t?.hint || '';
  if (!BRUSH_TOOLS.has(id)) {
    _brushCursorEl().style.display = 'none';
    canvas.style.cursor = 'crosshair';
  }
}

// ── SWATCHES ───────────────────────────────────────────────────────────────
function buildSwatches() {
  const grid = document.getElementById('swatch-grid');
  grid.innerHTML = '';
  PALETTE.forEach(col => {
    const el = document.createElement('div');
    el.className = 'swatch' + (col === currentColor ? ' active' : '');
    el.style.background = col;
    el.dataset.color = col;
    el.title = col;
    el.addEventListener('click', () => pickColor(col));
    grid.appendChild(el);
  });
}

function pickColor(col) {
  currentColor = col;
  currentAlpha = 255;
  document.getElementById('color-picker').value = col;
  document.getElementById('color-preview-box').style.background = col;
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === col));
  document.getElementById('transparent-swatch').classList.remove('active');
}

function pickTransparent() {
  currentAlpha = 0;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  document.getElementById('transparent-swatch').classList.add('active');
  document.getElementById('color-preview-box').style.background =
    'repeating-conic-gradient(#555 0% 25%, #333 0% 50%) 0 0 / 8px 8px';
}

function setupColorPicker() {
  const picker  = document.getElementById('color-picker');
  const preview = document.getElementById('color-preview-box');
  preview.style.background = currentColor;
  picker.addEventListener('input', e => pickColor(e.target.value));
}

// ── BRUSH ──────────────────────────────────────────────────────────────────
function setBrush(size) {
  brushSize = size;
  document.querySelectorAll('.brush-btn').forEach(b =>
    b.classList.toggle('active', parseInt(b.dataset.size) === size));
}

const BRUSH_TOOLS = new Set(['pencil','eraser','line','rect']);
const _brushCursorEl  = () => document.getElementById('brush-cursor');
const _canvasWrapEl   = () => document.getElementById('canvas-wrap');

function updateBrushCursor(e) {
  const cur = _brushCursorEl();
  if (!BRUSH_TOOLS.has(currentTool) || !canvas.matches(':hover')) {
    cur.style.display   = 'none';
    canvas.style.cursor = 'crosshair';
    return;
  }
  const canvasRect = canvas.getBoundingClientRect();
  const wrapRect   = _canvasWrapEl().getBoundingClientRect();
  const px   = Math.floor((e.clientX - canvasRect.left) / zoom);
  const py   = Math.floor((e.clientY - canvasRect.top)  / zoom);
  const half = Math.floor(brushSize / 2);
  const sz   = brushSize * zoom;
  cur.style.left    = (canvasRect.left - wrapRect.left + (px - half) * zoom) + 'px';
  cur.style.top     = (canvasRect.top  - wrapRect.top  + (py - half) * zoom) + 'px';
  cur.style.width   = sz + 'px';
  cur.style.height  = sz + 'px';
  cur.style.display = 'block';
  canvas.style.cursor = 'none';
}

// ── FRAME SLOTS ────────────────────────────────────────────────────────────
function buildFrameSlots() {
  const container = document.getElementById('frame-slots');
  container.innerHTML = '';
  for (let i = 0; i < NUM_FRAMES; i++) {
    const slot = document.createElement('div');
    slot.className = 'frame-slot' + (i === currentFrame ? ' active' : '');
    slot.dataset.frame = i;
    const thumbCvs = document.createElement('canvas');
    thumbCvs.width = TILE_W; thumbCvs.height = TILE_H;
    const num = document.createElement('div');
    num.className = 'frame-num';
    num.textContent = i + 1;
    slot.appendChild(thumbCvs);
    slot.appendChild(num);
    slot.addEventListener('click', () => switchFrame(i));
    container.appendChild(slot);
  }
}

function switchFrame(i) {
  currentFrame = i;
  previewPx = null; lineStart = null;
  document.querySelectorAll('.frame-slot').forEach((s, idx) =>
    s.classList.toggle('active', idx === i));
  renderAll();
}

// ── PIXEL HELPERS ──────────────────────────────────────────────────────────
function hexToRGBA(hex) {
  return [
    parseInt(hex.slice(1,3), 16),
    parseInt(hex.slice(3,5), 16),
    parseInt(hex.slice(5,7), 16),
    currentAlpha,
  ];
}

function setPixel(data, x, y, r, g, b, a) {
  if (x < 0 || y < 0 || x >= TILE_W || y >= TILE_H) return;
  const i = (y * TILE_W + x) * 4;
  data[i]=r; data[i+1]=g; data[i+2]=b; data[i+3]=a;
}

function getPixel(data, x, y) {
  if (x < 0 || y < 0 || x >= TILE_W || y >= TILE_H) return [0,0,0,0];
  const i = (y * TILE_W + x) * 4;
  return [data[i], data[i+1], data[i+2], data[i+3]];
}

function paintBrush(data, px, py, r, g, b, a) {
  const half = Math.floor(brushSize / 2);
  for (let dy = -half; dy < brushSize - half; dy++)
    for (let dx = -half; dx < brushSize - half; dx++)
      setPixel(data, px+dx, py+dy, r, g, b, a);
}

function floodFill(data, sx, sy, nr, ng, nb, na) {
  const [tr,tg,tb,ta] = getPixel(data, sx, sy);
  if (tr===nr && tg===ng && tb===nb && ta===na) return;
  const stack   = [[sx, sy]];
  const visited = new Uint8Array(TILE_W * TILE_H);
  while (stack.length) {
    const [x, y] = stack.pop();
    if (x<0||y<0||x>=TILE_W||y>=TILE_H) continue;
    const key = y*TILE_W+x;
    if (visited[key]) continue;
    const [cr,cg,cb,ca] = getPixel(data, x, y);
    if (cr!==tr||cg!==tg||cb!==tb||ca!==ta) continue;
    visited[key] = 1;
    setPixel(data, x, y, nr, ng, nb, na);
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
}

function bresenham(x0,y0,x1,y1) {
  const pts=[];
  let dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
  let sx=x0<x1?1:-1, sy=y0<y1?1:-1, err=dx-dy;
  for(;;) {
    pts.push([x0,y0]);
    if(x0===x1&&y0===y1) break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx;}
    if(e2<dx){err+=dx;y0+=sy;}
  }
  return pts;
}

function rectOutline(x0,y0,x1,y1) {
  const pts=[];
  const lx=Math.min(x0,x1),rx=Math.max(x0,x1);
  const ty=Math.min(y0,y1),by=Math.max(y0,y1);
  for(let x=lx;x<=rx;x++){pts.push([x,ty]);if(ty!==by)pts.push([x,by]);}
  for(let y=ty+1;y<by;y++){pts.push([lx,y]);if(lx!==rx)pts.push([rx,y]);}
  return pts;
}

function stampPoints(pts, r, g, b, a) {
  const half = Math.floor(brushSize/2);
  const result = [];
  pts.forEach(([x,y]) => {
    for(let dy=-half;dy<brushSize-half;dy++)
      for(let dx=-half;dx<brushSize-half;dx++)
        result.push([x+dx,y+dy,r,g,b,a]);
  });
  return result;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function frameToCanvas(frameData, targetCtx, tw, th) {
  const offscreen = document.createElement('canvas');
  offscreen.width = TILE_W; offscreen.height = TILE_H;
  const octx = offscreen.getContext('2d');
  octx.putImageData(new ImageData(new Uint8ClampedArray(frameData), TILE_W, TILE_H), 0, 0);
  targetCtx.imageSmoothingEnabled = false;
  targetCtx.drawImage(offscreen, 0, 0, tw, th);
}

function mergePreview(base) {
  const merged = new Uint8ClampedArray(base);
  previewPx.forEach(([x,y,r,g,b,a]) => {
    if(x>=0&&y>=0&&x<TILE_W&&y<TILE_H) {
      const i=(y*TILE_W+x)*4;
      merged[i]=r;merged[i+1]=g;merged[i+2]=b;merged[i+3]=a;
    }
  });
  return merged;
}

function render() {
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);

  // Onion skin — previous frame at 25% opacity
  if (onionSkin && currentFrame > 0) {
    ctx.globalAlpha = 0.25;
    frameToCanvas(frames[currentFrame-1], ctx, cw, ch);
    ctx.globalAlpha = 1;
  }

  // Current frame (merged with preview if line/rect in progress)
  const working = previewPx ? mergePreview(frames[currentFrame]) : frames[currentFrame];
  frameToCanvas(working, ctx, cw, ch);

  // Grid
  if (showGrid && zoom >= 4) {
    ctx.lineWidth = 0.5;
    // Fine grid — every pixel
    ctx.strokeStyle = 'rgba(100,112,130,0.25)';
    for (let x = 0; x <= TILE_W; x++) {
      ctx.beginPath(); ctx.moveTo(x*zoom, 0); ctx.lineTo(x*zoom, ch); ctx.stroke();
    }
    for (let y = 0; y <= TILE_H; y++) {
      ctx.beginPath(); ctx.moveTo(0, y*zoom); ctx.lineTo(cw, y*zoom); ctx.stroke();
    }
    // Coarse grid — every 8 pixels
    ctx.strokeStyle = 'rgba(100,112,130,0.5)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= TILE_W; x+=8) {
      ctx.beginPath(); ctx.moveTo(x*zoom, 0); ctx.lineTo(x*zoom, ch); ctx.stroke();
    }
    for (let y = 0; y <= TILE_H; y+=8) {
      ctx.beginPath(); ctx.moveTo(0, y*zoom); ctx.lineTo(cw, y*zoom); ctx.stroke();
    }
  }

  // Border
  ctx.strokeStyle = '#2e3040';
  ctx.lineWidth   = 1;
  ctx.strokeRect(0, 0, cw, ch);
}

function renderThumb(i) {
  const slots = document.querySelectorAll('.frame-slot');
  if (!slots[i]) return;
  const tc = slots[i].querySelector('canvas');
  if (!tc) return;
  tc.getContext('2d').putImageData(
    new ImageData(new Uint8ClampedArray(frames[i]), TILE_W, TILE_H), 0, 0);
}

function renderAllThumbs() {
  for (let i = 0; i < NUM_FRAMES; i++) renderThumb(i);
}

function renderPreview() {
  if (animating) return;
  previewCtx.clearRect(0, 0, 64, 64);
  frameToCanvas(frames[currentFrame], previewCtx, 64, 64);
}

function renderAll() { render(); renderAllThumbs(); renderPreview(); }

// ── CANVAS INPUT ───────────────────────────────────────────────────────────
function canvasPixel(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left)  / zoom);
  const y = Math.floor((e.clientY - rect.top)    / zoom);
  return [Math.max(0,Math.min(TILE_W-1,x)), Math.max(0,Math.min(TILE_H-1,y))];
}

function getRGBA(erase) {
  return erase || currentAlpha === 0 ? [0,0,0,0] : hexToRGBA(currentColor);
}

function bindCanvasEvents() {
  canvas.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup',   onUp);
  canvas.addEventListener('mouseleave', () => {
    document.getElementById('coords').textContent = '—';
    _brushCursorEl().style.display = 'none';
    canvas.style.cursor = 'crosshair';
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    adjustZoom(e.deltaY < 0 ? 2 : -2);
  }, { passive: false });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
}

function onDown(e) {
  if (e.button !== 0 && e.button !== 2) return;
  e.preventDefault();
  isDrawing = true;
  const [px, py] = canvasPixel(e);
  const erase = e.button === 2 || currentTool === 'eraser';
  const [r,g,b,a] = getRGBA(erase);
  const frame = frames[currentFrame];

  if (currentTool === 'eyedropper') {
    const [pr,pg,pb,pa] = getPixel(frame, px, py);
    if (pa > 0) {
      pickColor('#' + [pr,pg,pb].map(v => v.toString(16).padStart(2,'0')).join(''));
    }
    isDrawing = false; return;
  }
  if (currentTool === 'fill') {
    pushHistory();
    floodFill(frame, px, py, r, g, b, a);
    renderAll(); isDrawing = false; return;
  }
  if (currentTool === 'line' || currentTool === 'rect') {
    lineStart = [px, py]; previewPx = []; return;
  }
  // Pencil / eraser
  pushHistory();
  paintBrush(frame, px, py, r, g, b, a);
  renderAll();
}

function onMove(e) {
  updateBrushCursor(e);
  if (!canvas.matches(':hover') && !isDrawing) return;
  const [px, py] = canvasPixel(e);
  document.getElementById('coords').textContent = `${px}, ${py}`;
  if (!isDrawing) return;

  const erase = currentTool === 'eraser';
  const [r,g,b,a] = getRGBA(erase);
  const frame = frames[currentFrame];

  if (currentTool === 'line' && lineStart) {
    previewPx = stampPoints(bresenham(lineStart[0],lineStart[1],px,py), r,g,b,a);
    render(); return;
  }
  if (currentTool === 'rect' && lineStart) {
    previewPx = stampPoints(rectOutline(lineStart[0],lineStart[1],px,py), r,g,b,a);
    render(); return;
  }
  // Pencil/eraser drag (already pushed history on mousedown)
  paintBrush(frame, px, py, r, g, b, a);
  render();
  renderThumb(currentFrame);
}

function onUp(e) {
  if (!isDrawing) return;
  isDrawing = false;
  const frame = frames[currentFrame];

  if ((currentTool === 'line' || currentTool === 'rect') && previewPx) {
    pushHistory();
    previewPx.forEach(([x,y,r,g,b,a]) => setPixel(frame, x, y, r, g, b, a));
  }
  previewPx = null; lineStart = null;
  renderAll();
}

// ── HISTORY ────────────────────────────────────────────────────────────────
const MAX_HISTORY = 50;

function pushHistory() {
  history = history.slice(0, historyIdx + 1);
  history.push(frames.map(f => new Uint8ClampedArray(f)));
  if (history.length > MAX_HISTORY) history.shift();
  historyIdx = history.length - 1;
}

function undo() {
  if (historyIdx <= 0) { flashStatus('NOTHING TO UNDO'); return; }
  historyIdx--;
  restoreSnap();
}

function redo() {
  if (historyIdx >= history.length - 1) { flashStatus('NOTHING TO REDO'); return; }
  historyIdx++;
  restoreSnap();
}

function restoreSnap() {
  history[historyIdx].forEach((snap, i) => frames[i].set(snap));
  renderAll();
}

// ── KEYBOARD ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); e.shiftKey ? redo() : undo(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='y') { e.preventDefault(); redo(); return; }
  const map = {p:'pencil',e:'eraser',f:'fill',i:'eyedropper',l:'line',r:'rect'};
  if (!e.ctrlKey && !e.metaKey && map[e.key]) selectTool(map[e.key]);
  if (e.key==='[') setBrush(Math.max(1, brushSize-1));
  if (e.key===']') setBrush(Math.min(4, brushSize+1));
});

// ── TOGGLES ────────────────────────────────────────────────────────────────
function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('btn-grid').classList.toggle('active', showGrid);
  render();
}

function toggleOnion() {
  onionSkin = !onionSkin;
  document.getElementById('btn-onion').classList.toggle('active', onionSkin);
  render();
}

function toggleAnimate() {
  animating = !animating;
  const btn = document.getElementById('btn-play');
  btn.textContent = animating ? '⏹' : '▶';
  btn.classList.toggle('active', animating);
  animating ? startAnim() : stopAnim();
}

// ── ANIMATION ──────────────────────────────────────────────────────────────
function startAnim() {
  stopAnim();
  animFrame = currentFrame;
  const fps = Math.max(1, parseInt(document.getElementById('fps-input').value) || 8);
  animTimer = setInterval(() => {
    previewCtx.clearRect(0, 0, 64, 64);
    frameToCanvas(frames[animFrame], previewCtx, 64, 64);
    animFrame = (animFrame + 1) % NUM_FRAMES;
  }, 1000 / fps);
}

function stopAnim() {
  clearInterval(animTimer); animTimer = null;
  renderPreview();
}

// ── FRAME OPS ──────────────────────────────────────────────────────────────
function dupFrame() {
  pushHistory();
  const next = (currentFrame + 1) % NUM_FRAMES;
  frames[next].set(frames[currentFrame]);
  switchFrame(next);
  flashStatus(`FRAME ${currentFrame + 1} DUPLICATED → F${next + 1}`);
}

function clearFrame(all) {
  pushHistory();
  if (all) {
    frames.forEach(f => f.fill(0));
    flashStatus('ALL FRAMES CLEARED');
  } else {
    frames[currentFrame].fill(0);
    flashStatus(`FRAME ${currentFrame + 1} CLEARED`);
  }
  renderAll();
}

// ── EXPORT ─────────────────────────────────────────────────────────────────
function makeFrameCanvas(i) {
  const c = document.createElement('canvas');
  c.width = TILE_W; c.height = TILE_H;
  c.getContext('2d').putImageData(
    new ImageData(new Uint8ClampedArray(frames[i]), TILE_W, TILE_H), 0, 0);
  return c;
}

function download(cvs, filename) {
  const a = document.createElement('a');
  a.href = cvs.toDataURL('image/png'); a.download = filename; a.click();
}

function exportFrame() {
  const name = document.getElementById('tile-name').value.trim() || 'tile';
  download(makeFrameCanvas(currentFrame), `${name}_f${currentFrame+1}.png`);
  flashStatus('FRAME PNG EXPORTED');
}

function exportSheet() {
  const name = document.getElementById('tile-name').value.trim() || 'tile';
  const sheet = document.createElement('canvas');
  sheet.width = TILE_W * NUM_FRAMES; sheet.height = TILE_H;
  const sctx = sheet.getContext('2d');
  for (let i = 0; i < NUM_FRAMES; i++)
    sctx.drawImage(makeFrameCanvas(i), i * TILE_W, 0);
  download(sheet, `${name}_sheet.png`);
  flashStatus(`SPRITESHEET EXPORTED (${TILE_W*NUM_FRAMES}×${TILE_H})`);
}

function exportJSON() {
  const name = document.getElementById('tile-name').value.trim() || 'tile';
  const blob = new Blob([JSON.stringify({
    name, width: TILE_W, height: TILE_H, frames: NUM_FRAMES,
    pixels: frames.map(f => Array.from(f)),
  })], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `${name}.json`; a.click();
  flashStatus('TILE DATA EXPORTED');
}

function importJSON() { document.getElementById('import-input').click(); }

function onImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.pixels)) throw new Error();
      pushHistory();
      data.pixels.forEach((arr, i) => {
        if (i < NUM_FRAMES) frames[i].set(arr.slice(0, TILE_W * TILE_H * 4));
      });
      if (data.name) document.getElementById('tile-name').value = data.name;
      renderAll();
      flashStatus('TILE DATA LOADED');
    } catch { flashStatus('LOAD FAILED — INVALID FILE'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── STATUS TOAST ───────────────────────────────────────────────────────────
let _toastT = null;
function flashStatus(msg) {
  const el = document.getElementById('status-toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── START ──────────────────────────────────────────────────────────────────
init();
</script>
</body>
